<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Background Boxes</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0f172a; /* slate-900 */
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    /* ── Grid wrapper ── */
    #boxes-container {
      pointer-events: auto;
      position: fixed;
      inset: 0;
      z-index: 0;
      display: flex;

      top: 50%;
      left: 50%;
      width: 300vw;
      height: 300vh;
      transform: translate(-50%, -50%) skewX(-48deg) skewY(14deg) scale(0.675);
      transform-origin: center center;
    }

    /* ── One column ── */
    .box-row {
      position: relative;
      height: 100%;
      width: 4rem;          /* w-16 = 64px */
      border-left: 1px solid #334155; /* slate-700 */
      display: flex;
      flex-direction: column;
    }

    /* ── One cell ── */
    .box-cell {
      position: relative;
      height: 2rem;         /* h-8 = 32px */
      width: 4rem;          /* w-16 = 64px */
      border-right: 1px solid #334155;
      border-top: 1px solid #334155;
      flex-shrink: 0;
      transition: background-color 2s ease;
      cursor: default;
    }

    /* instant color-in, slow fade-out */
    .box-cell.hovered {
      transition: background-color 0s;
    }

    /* ── Plus SVG ── */
    .box-cell .plus {
      pointer-events: none;
      position: absolute;
      left: -22px;
      top: -14px;
      width: 40px;
      height: 24px;
      color: #334155; /* slate-700 */
    }

    /* ── Vignette overlay ── */
    #vignette {
      pointer-events: none;
      position: fixed;
      inset: 0;
      z-index: 20;
      background: #0f172a;
      -webkit-mask-image: radial-gradient(ellipse at center, transparent 20%, black 100%);
      mask-image: radial-gradient(ellipse at center, transparent 20%, black 100%);
    }
  </style>
</head>
<body>

  <div id="boxes-container"></div>
  <div id="vignette"></div>

  <script>
    const COLORS = [
      "rgb(125,211,252)",  // sky-300
      "rgb(249,168,212)",  // pink-300
      "rgb(134,239,172)",  // green-300
      "rgb(253,224,71)",   // yellow-300
      "rgb(252,165,165)",  // red-300
      "rgb(216,180,254)",  // purple-300
      "rgb(147,197,253)",  // blue-300
      "rgb(165,180,252)",  // indigo-300
      "rgb(196,181,253)",  // violet-300
    ];

    const ROWS = 150;
    const COLS = 100;

    function randomColor() {
      return COLORS[Math.floor(Math.random() * COLORS.length)];
    }

    const plusSVG = `
      <svg class="plus" fill="none" stroke="currentColor" stroke-width="1.5"
           viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 6v12m6-6H6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`;

    function buildGrid() {
      const container = document.getElementById("boxes-container");
      const fragment = document.createDocumentFragment();

      for (let col = 0; col < COLS; col++) {
        const row = document.createElement("div");
        row.className = "box-row";

        for (let r = 0; r < ROWS; r++) {
          const cell = document.createElement("div");
          cell.className = "box-cell";

          // Show plus at even col/row intersections
          if (col % 2 === 0 && r % 2 === 0) {
            cell.innerHTML = plusSVG;
          }

          // Hover: instant color in, slow fade out
          cell.addEventListener("mouseenter", () => {
            cell.classList.add("hovered");
            cell.style.backgroundColor = randomColor();
          });

          cell.addEventListener("mouseleave", () => {
            cell.classList.remove("hovered");
            cell.style.backgroundColor = "";
          });

          row.appendChild(cell);
        }

        fragment.appendChild(row);
      }

      container.appendChild(fragment);
    }

    buildGrid();
  </script>
</body>
</html>
